<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odienmall - ระบบตะกร้าสินค้าเครื่องใช้ไฟฟ้า</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card img { height: 200px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">ODIENMALL</a>
            <div class="navbar-nav ms-auto">
                <button class="btn btn-outline-warning position-relative" data-bs-toggle="modal" data-bs-target="#cartModal">
                    🛒 ตะกร้าสินค้า
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4 fw-bold">เครื่องใช้ไฟฟ้ายอดนิยมของ odienmall</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for item in products %}
            <div class="col">
                <div class="card h-100 shadow-sm product-card">
                    <img src="{{ item.image }}" class="card-img-top" alt="{{ item.name }}">
                    <div class="card-body">
                        <span class="badge bg-secondary mb-2">{{ item.category }}</span>
                        <h5 class="card-title fw-bold">{{ item.name }}</h5>
                        <p class="card-text text-danger fs-5 fw-bold">฿{{ "{:,.2f}".format(item.price) }}</p>
                        <button class="btn btn-primary w-100" onclick="cart.addItem({{ item.id }}, '{{ item.name }}', {{ item.price }})">เพิ่มลงตะกร้า</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">รายการสินค้าในตะกร้า</h5>
                    <button type="text" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul id="cart-items-list" class="list-group mb-3">
                        </ul>
                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>ยอดรวมทั้งสิ้น:</span>
                        <span class="text-danger" id="cart-total-price">฿0.00</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ช้อปต่อ</button>
                    <button type="button" class="btn btn-success" onclick="cart.checkout()">สั่งซื้อสินค้า (Checkout)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>
</html>

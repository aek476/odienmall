<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odienmall - ศูนย์รวมเครื่องใช้ไฟฟ้าออนไลน์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card img { height: 200px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">ODIENMALL</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="#">หน้าแรก</a>
                <button class="btn btn-outline-warning position-relative ms-2">
                    🛒 ตะกร้าสินค้า
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4 fw-bold">เครื่องใช้ไฟฟ้ายอดนิยมของ odienmall</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for item in products %}
            <div class="col">
                <div class="card h-100 shadow-sm product-card">
                    <img src="{{ item.image }}" class="card-img-top" alt="{{ item.name }}">
                    <div class="card-body">
                        <span class="badge bg-secondary mb-2">{{ item.category }}</span>
                        <h5 class="card-title fw-bold">{{ item.name }}</h5>
                        <p class="card-text text-danger fs-5 fw-bold">฿{{ "{:,.2f}".format(item.price) }}</p>
                        <button class="btn btn-primary w-100" onclick="addToCart('{{ item.name }}')">เพิ่มลงตะกร้า</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        let count = 0;
        function addToCart(productName) {
            count++;
            document.getElementById('cart-count').innerText = count;
            alert("เพิ่ม " + productName + " ลงตะกร้าของ odienmall สำเร็จค่ะ!");
        }
    </script>
</body>
</html>
